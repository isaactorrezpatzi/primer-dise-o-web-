<section class="contenedor-ejercicios">

<button onclick="hora()">Ver hora</button>

</div>

<button onclick="confirm('¿Deseas continuar?')">

</button>
</div>

<img id="img" src="../img/perfil.jpg" width="100">
<button onclick="document.getElementById('img').src='../img/logo.png'">
Cambiar imagen
</button>
</div>

<div class="ejercicio animar">

<button onclick="location.reload()">Reiniciar</button>
</div>

</section>

<script src="ejer4.js"></script>
<script>
function hora(){
document.getElementById("hora").innerText = new Date().toLocaleTimeString();
}
</script>
